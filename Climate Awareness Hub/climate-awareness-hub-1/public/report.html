<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report Environmental Issues - Climate Awareness Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/report.js" defer></script>
</head>
<body>

<header>
    <!-- Include header content here -->
</header>

<nav aria-label="Main navigation">
    <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="weather.html">Weather</a></li>
        <li><a href="report.html" aria-current="page">Report Issue</a></li>
        <li><a href="education.html">Education</a></li>
    </ul>
</nav>

<main class="container" id="main-content">
    <h1>Report Environmental Issues</h1>
    <form id="report-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" required>

        <label for="issue-type">Issue Type:</label>
        <select id="issue-type" name="issue-type" required>
            <option value="">Select an issue</option>
            <option value="pollution">Pollution</option>
            <option value="deforestation">Deforestation</option>
            <option value="waste">Waste Management</option>
            <option value="climate-change">Climate Change</option>
        </select>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <button type="submit">Submit Report</button>
    </form>
    <div id="success-message" class="hidden">Thank you for your report! We will review it shortly.</div>
</main>

<footer>
    <!-- Include footer content here -->
</footer>

</body>
</html>
